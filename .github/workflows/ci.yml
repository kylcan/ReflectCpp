name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Lint with ruff
        run: ruff check sentinel_agent/ sentinel_run.py tests/ eval/

      - name: Run CLI smoke test (offline fallback)
        run: |
          SENTINEL_OFFLINE=1 python sentinel_run.py samples/vuln_sample.cpp --max-iter 2 --trace
          SENTINEL_OFFLINE=1 python -c "from sentinel_agent.graph import run_agent; r=run_agent('samples/vuln_sample.cpp', max_iterations=2); assert 'final_report' in r"

      - name: Run unit tests
        run: pytest -q

      - name: Run eval smoke (10 cases)
        run: SENTINEL_OFFLINE=1 python -m eval.run_eval --regen --limit 10

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t sentinelagent:ci .

      - name: Smoke test container
        run: |
          docker run -d --name test-api -p 8000:8000 sentinelagent:ci
          sleep 3
          curl -sf http://localhost:8000/health | grep -q '"ok"'
          docker stop test-api
